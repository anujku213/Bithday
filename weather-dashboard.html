<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard 🌤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* SEARCH BAR */
        .search-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 15px 20px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        /* CURRENT WEATHER */
        .current-weather {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .location-info h2 {
            font-size: 36px;
            color: #333;
            margin-bottom: 5px;
        }

        .location-info p {
            color: #666;
            font-size: 16px;
        }

        .temperature {
            text-align: right;
        }

        .temp-value {
            font-size: 72px;
            font-weight: 900;
            color: #667eea;
            line-height: 1;
        }

        .weather-desc {
            font-size: 20px;
            color: #666;
            margin-top: 10px;
            text-transform: capitalize;
        }

        /* WEATHER ICON */
        .weather-icon {
            font-size: 80px;
            text-align: center;
            margin: 20px 0;
        }

        /* WEATHER GRID */
        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .detail-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .detail-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .detail-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .detail-value {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        /* HOURLY FORECAST */
        .forecast-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .hourly-forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .hour-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            min-width: 100px;
            transition: all 0.3s;
        }

        .hour-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .hour-time {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .hour-icon {
            font-size: 40px;
            margin: 10px 0;
        }

        .hour-temp {
            font-size: 18px;
            font-weight: 700;
        }

        /* 7 DAY FORECAST */
        .daily-forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .day-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
        }

        .day-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .day-name {
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .day-icon {
            font-size: 50px;
            margin: 15px 0;
        }

        .day-temps {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .day-high {
            font-weight: 700;
            color: #667eea;
            font-size: 18px;
        }

        .day-low {
            color: #999;
            font-size: 16px;
        }

        .day-desc {
            font-size: 12px;
            color: #666;
            text-transform: capitalize;
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success {
            background: #51cf66;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .temp-value {
                font-size: 48px;
            }

            .weather-header {
                flex-direction: column;
                text-align: center;
            }

            .temperature {
                text-align: center;
            }

            .search-section {
                flex-direction: column;
            }

            .search-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather updates for any city</p>
        </div>

        <!-- SEARCH -->
        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                class="search-input" 
                placeholder="Enter city name..." 
                onkeypress="if(event.key==='Enter') searchWeather()"
            >
            <button class="search-btn" onclick="searchWeather()">🔍 Search</button>
            <button class="search-btn" onclick="getCurrentLocation()">📍 My Location</button>
        </div>

        <!-- ERROR/SUCCESS MESSAGES -->
        <div id="message"></div>

        <!-- LOADING -->
        <div id="loadingDiv" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <!-- CURRENT WEATHER -->
        <div id="currentWeather" class="current-weather" style="display: none;">
            <div class="weather-header">
                <div class="location-info">
                    <h2 id="cityName"></h2>
                    <p id="currentDate"></p>
                </div>
                <div class="temperature">
                    <div class="temp-value" id="temperature">--°C</div>
                    <div class="weather-desc" id="weatherDesc"></div>
                </div>
            </div>

            <div class="weather-icon" id="weatherIcon">🌤️</div>

            <div class="weather-details">
                <div class="detail-box">
                    <div class="detail-label">💧 Humidity</div>
                    <div class="detail-value" id="humidity">--%</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">💨 Wind Speed</div>
                    <div class="detail-value" id="windSpeed">-- m/s</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">🌡️ Feels Like</div>
                    <div class="detail-value" id="feelsLike">--°C</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">🔽 Pressure</div>
                    <div class="detail-value" id="pressure">-- mb</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">👁️ Visibility</div>
                    <div class="detail-value" id="visibility">-- km</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">⬆️ UV Index</div>
                    <div class="detail-value" id="uvIndex">--</div>
                </div>
            </div>
        </div>

        <!-- HOURLY FORECAST -->
        <div id="hourlySection" class="forecast-section" style="display: none;">
            <h3 class="section-title">⏰ Hourly Forecast</h3>
            <div class="hourly-forecast" id="hourlyForecast"></div>
        </div>

        <!-- 7 DAY FORECAST -->
        <div id="dailySection" class="forecast-section" style="display: none;">
            <h3 class="section-title">📅 7-Day Forecast</h3>
            <div class="daily-forecast" id="dailyForecast"></div>
        </div>
    </div>

    <script>
        const API_KEY = 'c4d0a89d7a5f4f9e8f8d5b8e5e5e5e5e'; // Free tier key
        const BASE_URL = 'https://api.weatherapi.com/v1';

        // SHOW MESSAGE
        function showMessage(text, type = 'error') {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<div class="${type}">${text}</div>`;
            setTimeout(() => msgDiv.innerHTML = '', 5000);
        }

        // GET WEATHER ICON
        function getWeatherIcon(condition) {
            const icons = {
                'clear': '☀️',
                'sunny': '☀️',
                'cloudy': '☁️',
                'cloud': '☁️',
                'overcast': '☁️',
                'rain': '🌧️',
                'rainy': '🌧️',
                'drizzle': '🌦️',
                'thunderstorm': '⛈️',
                'snow': '❄️',
                'sleet': '🌨️',
                'mist': '🌫️',
                'fog': '🌫️',
                'wind': '💨',
                'partly': '⛅'
            };

            const lower = condition.toLowerCase();
            for (let key in icons) {
                if (lower.includes(key)) return icons[key];
            }
            return '🌤️';
        }

        // SEARCH WEATHER
        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showMessage('❌ Please enter a city name', 'error');
                return;
            }

            fetchWeather(city);
        }

        // GET CURRENT LOCATION
        function getCurrentLocation() {
            if (navigator.geolocation) {
                document.getElementById('loadingDiv').style.display = 'block';
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        fetchWeatherByCoords(latitude, longitude);
                    },
                    () => {
                        showMessage('❌ Unable to get your location', 'error');
                        document.getElementById('loadingDiv').style.display = 'none';
                    }
                );
            } else {
                showMessage('❌ Geolocation not supported', 'error');
            }
        }

        // FETCH WEATHER
        async function fetchWeather(city) {
            document.getElementById('loadingDiv').style.display = 'block';

            try {
                // Current weather
                const currentRes = await fetch(
                    `${BASE_URL}/current.json?key=${API_KEY}&q=${city}&aqi=yes`
                );

                if (!currentRes.ok) {
                    throw new Error('City not found');
                }

                const currentData = await currentRes.json();

                // Forecast
                const forecastRes = await fetch(
                    `${BASE_URL}/forecast.json?key=${API_KEY}&q=${city}&days=7&aqi=no`
                );

                const forecastData = await forecastRes.json();

                displayCurrentWeather(currentData);
                displayHourlyForecast(forecastData);
                displayDailyForecast(forecastData);

                showMessage('✅ Weather data loaded successfully!', 'success');
            } catch (error) {
                showMessage(`❌ ${error.message}`, 'error');
            } finally {
                document.getElementById('loadingDiv').style.display = 'none';
            }
        }

        // FETCH BY COORDS
        async function fetchWeatherByCoords(lat, lon) {
            try {
                const currentRes = await fetch(
                    `${BASE_URL}/current.json?key=${API_KEY}&q=${lat},${lon}&aqi=yes`
                );

                const currentData = await currentRes.json();

                const forecastRes = await fetch(
                    `${BASE_URL}/forecast.json?key=${API_KEY}&q=${lat},${lon}&days=7&aqi=no`
                );

                const forecastData = await forecastRes.json();

                displayCurrentWeather(currentData);
                displayHourlyForecast(forecastData);
                displayDailyForecast(forecastData);

                showMessage('✅ Using your location', 'success');
            } catch (error) {
                showMessage(`��� ${error.message}`, 'error');
            } finally {
                document.getElementById('loadingDiv').style.display = 'none';
            }
        }

        // DISPLAY CURRENT WEATHER
        function displayCurrentWeather(data) {
            const { current, location } = data;

            document.getElementById('cityName').textContent = `${location.name}, ${location.country}`;
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            document.getElementById('temperature').textContent = `${Math.round(current.temp_c)}°C`;
            document.getElementById('weatherDesc').textContent = current.condition.text;
            document.getElementById('weatherIcon').textContent = getWeatherIcon(current.condition.text);
            document.getElementById('humidity').textContent = `${current.humidity}%`;
            document.getElementById('windSpeed').textContent = `${current.wind_kph.toFixed(1)} km/h`;
            document.getElementById('feelsLike').textContent = `${Math.round(current.feelslike_c)}°C`;
            document.getElementById('pressure').textContent = `${current.pressure_mb} mb`;
            document.getElementById('visibility').textContent = `${current.vis_km} km`;
            document.getElementById('uvIndex').textContent = Math.round(current.uv);

            document.getElementById('currentWeather').style.display = 'block';
            document.getElementById('cityInput').value = location.name;
        }

        // DISPLAY HOURLY FORECAST
        function displayHourlyForecast(data) {
            const hours = data.forecast.forecastday[0].hour.slice(0, 24);
            let html = '';

            hours.forEach(hour => {
                const time = new Date(hour.time).toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: true 
                });

                html += `
                    <div class="hour-card">
                        <div class="hour-time">${time}</div>
                        <div class="hour-icon">${getWeatherIcon(hour.condition.text)}</div>
                        <div class="hour-temp">${Math.round(hour.temp_c)}°C</div>
                    </div>
                `;
            });

            document.getElementById('hourlyForecast').innerHTML = html;
            document.getElementById('hourlySection').style.display = 'block';
        }

        // DISPLAY DAILY FORECAST
        function displayDailyForecast(data) {
            let html = '';

            data.forecast.forecastday.forEach((day, index) => {
                const date = new Date(day.date);
                const dayName = index === 0 ? 'Today' : date.toLocaleDateString('en-US', { weekday: 'short' });

                html += `
                    <div class="day-card">
                        <div class="day-name">${dayName}</div>
                        <div class="day-icon">${getWeatherIcon(day.day.condition.text)}</div>
                        <div class="day-temps">
                            <div class="day-high">${Math.round(day.day.maxtemp_c)}°</div>
                            <div class="day-low">${Math.round(day.day.mintemp_c)}°</div>
                        </div>
                        <div class="day-desc">${day.day.condition.text}</div>
                    </div>
                `;
            });

            document.getElementById('dailyForecast').innerHTML = html;
            document.getElementById('dailySection').style.display = 'block';
        }

        // LOAD DEFAULT CITY ON PAGE LOAD
        window.addEventListener('load', () => {
            fetchWeather('New York');
        });
    </script>
</body>
</html>
